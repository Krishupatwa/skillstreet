<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us</title>
</head>
<link rel="stylesheet" href="style.css" class="css">
<body>
    <section class="contact">
        <div class="content">
            <h2>Contact Us</h2>
            <p>Welcome to skillstreet . Please write your query below , we will be happy to help you out.</p>
        </div>
        <div class="container-query">
            <div class="contactinfo">
                <div class="box">
                    <div class="icon"><ion-icon name="mail"></ion-icon></div>
                    <div class="text">
                        <h1>E-mail address</h1>
                        <p>support.skillstreet@gmail.com</p>
                    </div>
                </div>
                     <div class="box">
                    <div class="icon"><ion-icon name="call"></ion-icon></div>
                    <div class="text">
                        <h1>Contact number</h1>
                        <p>support.skillstreet@gmail.com</p>
                    </div>
                     </div>
                </div>


                

           
            <div class="contactform">
                <form action="support.skillstreet@gmail.com">
                    <h2>Send Message</h2>
                    <div class="inputbox">
                        <input type="text" name="" required="required">
                        <span>Full Name</span>
                    </div>
                    <div class="inputbox">
                        <input type="text" name="" required="required">
                        <span>E-mail</span>
                    </div>
                    <div class="inputbox">
                        <input type="text" name="" required="required">
                        <span>Student/Startup</span>
                    </div>
                    <div class="inputbox">
                        <textarea required="required"></textarea>
                        <span>Type your query.....</span>
                    </div>
                    <div class="inputbox">
                        <input type="submit" name="" value="send">
                    </div>
                </form>
            </div>
        </div>
    </section>
     <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    
</body>
</html>
